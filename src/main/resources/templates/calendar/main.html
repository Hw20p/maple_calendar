<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>л©”мқҙн”ҢмҠӨнҶ лҰ¬ мәҳлҰ°лҚ”</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light-mode');</script>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/calendar}">рҹҚҒ л©”мқҙн”Ң мәҳлҰ°лҚ”</a></div>
    <div class="nav-links">
        <a th:href="@{/calendar}" class="active">мәҳлҰ°лҚ”</a>
        <a th:href="@{/characters}">мәҗлҰӯн„° кҙҖлҰ¬</a>
        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">вҳҖпёҸ</button>
    </div>
</nav>

<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- мәҗлҰӯн„°к°Җ м—Ҷмқ„ л•Ң -->
    <div th:if="${characters == null or characters.isEmpty()}" class="empty-state">
        <h2>л“ұлЎқлҗң мәҗлҰӯн„°к°Җ м—ҶмҠөлӢҲлӢӨ</h2>
        <p>мәҗлҰӯн„°лҘј лЁјм Җ л“ұлЎқн•ҙ мЈјм„ёмҡ”.</p>
        <a th:href="@{/characters}" class="btn btn-primary">мәҗлҰӯн„° л“ұлЎқн•ҳкё°</a>
    </div>

    <div th:if="${characters != null and !characters.isEmpty()}">
        <!-- мәҗлҰӯн„° м„ нғқ + мӣ” л„Өл№„кІҢмқҙм…ҳ -->
        <div class="calendar-header">
            <div class="character-selector">
                <form th:action="@{/calendar}" method="get" id="characterForm">
                    <select name="characterId" onchange="document.getElementById('characterForm').submit()"
                            class="select-character">
                        <th:block th:each="ch : ${characters}">
                            <option th:value="${ch.id}"
                                    th:text="${ch.characterName + ' Lv.' + ch.characterLevel + (ch.mainCharacter ? ' вҳ…' : '')}"
                                    th:selected="${selectedCharacter != null and ch.id == selectedCharacter.id}">
                            </option>
                        </th:block>
                    </select>
                    <input type="hidden" name="year" th:value="${yearMonth?.year}">
                    <input type="hidden" name="month" th:value="${yearMonth?.monthValue}">
                </form>
            </div>

            <div class="month-nav" th:if="${yearMonth != null}">
                <a th:href="@{/calendar(characterId=${selectedCharacter?.id}, year=${prevMonth?.year}, month=${prevMonth?.monthValue})}"
                   class="btn btn-nav">вҖ№</a>
                <span class="month-title"
                      th:text="${yearMonth.year + 'л…„ ' + yearMonth.monthValue + 'мӣ”'}"></span>
                <a th:href="@{/calendar(characterId=${selectedCharacter?.id}, year=${nextMonth?.year}, month=${nextMonth?.monthValue})}"
                   class="btn btn-nav">вҖә</a>
            </div>

            <!-- ліҙмҠӨ кІ°м • лҸҷкё°нҷ” лІ„нҠј -->
            <div th:if="${selectedCharacter != null}">
                <form th:action="@{/calendar/boss/sync}" method="post">
                    <input type="hidden" name="characterId" th:value="${selectedCharacter.id}">
                    <input type="hidden" name="year" th:value="${yearMonth?.year}">
                    <input type="hidden" name="month" th:value="${yearMonth?.monthValue}">
                    <button type="submit" class="btn btn-sync">рҹ”„ ліҙмҠӨ кІ°м • лҸҷкё°нҷ”</button>
                </form>
            </div>
        </div>

        <!-- мәҗлҰӯн„° м •ліҙ м№ҙл“ң -->
        <div class="character-card" th:if="${selectedCharacter != null}">
            <img th:src="${selectedCharacter.characterImage}" th:alt="${selectedCharacter.characterName}"
                 class="character-img" onerror="this.style.display='none'">
            <div class="character-info">
                <span class="character-name" th:text="${selectedCharacter.characterName}"></span>
                <span class="character-detail"
                      th:text="${selectedCharacter.worldName + ' В· ' + selectedCharacter.characterClass + ' В· Lv.' + selectedCharacter.characterLevel}"></span>
            </div>
        </div>

        <!-- мәҳлҰ°лҚ” к·ёлҰ¬л“ң -->
        <div class="calendar" th:if="${dayRecords != null}">
            <!-- мҡ”мқј н—ӨлҚ” -->
            <div class="calendar-weekdays">
                <div class="weekday sun">мқј</div>
                <div class="weekday">мӣ”</div>
                <div class="weekday">нҷ”</div>
                <div class="weekday">мҲҳ</div>
                <div class="weekday">лӘ©</div>
                <div class="weekday">кёҲ</div>
                <div class="weekday sat">нҶ </div>
            </div>

            <!-- лӮ м§ң м…Җ -->
            <div class="calendar-grid">
                <!-- мІ«м§ё лӮ  м „ л№Ҳ м№ё -->
                <div th:each="i : ${#numbers.sequence(1, firstDayOfWeek)}" class="calendar-cell empty"></div>

                <div th:each="day : ${dayRecords}"
                     class="calendar-cell"
                     th:classappend="${day.date.equals(T(java.time.LocalDate).now()) ? ' today' : ''}
                                    + ${day.date.dayOfWeek.value == 7 ? ' sunday' : ''}
                                    + ${day.date.dayOfWeek.value == 6 ? ' saturday' : ''}">
                    <a th:href="@{/calendar/day(characterId=${selectedCharacter.id}, date=${day.date})}"
                       class="cell-link">
                        <div class="cell-date" th:text="${day.date.dayOfMonth}"></div>
                        <div class="cell-badges" th:if="${day.hasAnyRecord()}">
                            <span class="badge badge-boss"
                                  th:if="${!day.bossRecords.isEmpty()}"
                                  th:text="'вҡ” ' + ${day.bossRecords.size()}"></span>
                            <span class="badge badge-hunting"
                                  th:if="${!day.huntingRecords.isEmpty()}"
                                  th:text="'рҹ—Ў ' + ${day.huntingRecords.size()}"></span>
                            <span class="badge badge-item"
                                  th:if="${!day.itemRecords.isEmpty()}"
                                  th:text="'рҹ’Һ ' + ${day.itemRecords.size()}"></span>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- лІ”лЎҖ -->
        <div class="legend">
            <span class="badge badge-boss">вҡ” ліҙмҠӨ</span>
            <span class="badge badge-hunting">рҹ—Ў мӮ¬лғҘ</span>
            <span class="badge badge-item">рҹ’Һ л“қн…ң</span>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
